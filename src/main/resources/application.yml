server:
  # Render/Railway (and most PaaS) inject the listen port as PORT. Fall back to SERVER_PORT, then 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  forward-headers-strategy: framework
  servlet:
    context-path: /
  tomcat:
    threads:
      # Tomcat defaults to 200 worker threads. Each carries an off-heap stack (see -Xss in the
      # Dockerfile) plus per-thread buffers, so the default reserves memory this store will never
      # use — it serves a handful of concurrent requests. 25 is still far more headroom than needed.
      max: ${TOMCAT_MAX_THREADS:25}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:5}
    # Default is 8192 queued connections; each holds a buffer.
    max-connections: ${TOMCAT_MAX_CONNECTIONS:200}

spring:
  application:
    name: mailstock-backend

  datasource:
    # Full DB_URL wins; otherwise assembled from parts (Railway/Render supplies host/port/name/user/pass
    # separately, and blueprints can't string-interpolate a single JDBC URL).
    # For Railway/Render: add ?sslmode=require to the URL for SSL support on remote databases.
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mailstock}?sslmode=${DB_SSL_MODE:disable}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      # Each pooled connection costs memory on BOTH sides (JVM buffers + a backend process in
      # Postgres). 15 was never used concurrently; with 25 Tomcat threads, 5 is ample. It also keeps
      # us well under Railway's Postgres connection limit.
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      # Hand idle connections back instead of holding all 5 open forever.
      idle-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

app:
  name: MailStock.store
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  # Writable directory for admin-uploaded media (e.g. the deposit QR). Created on first upload.
  uploads-dir: ${UPLOADS_DIR:./data/uploads}
  mail:
    from: ${MAIL_FROM:no-reply@mailstock.store}
    from-name: ${MAIL_FROM_NAME:Mail Stock Store}
  resend:
    # Transactional email via HTTPS (not SMTP) — Railway Hobby blocks outbound SMTP on any port.
    api-key: ${RESEND_API_KEY:}
  security:
    jwt:
      # No default: the app must fail fast if JWT_SECRET is not provided (env-only secret).
      secret: ${JWT_SECRET}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL:30}
      # Session length: 7 days. The refresh token ROTATES on every /auth/refresh (old one revoked,
      # new 7-day token issued), so any activity within 7 days slides the window forward — a user who
      # opens the app at least once a week stays logged in; 7 days of inactivity ends the session.
      refresh-token-ttl-days: ${JWT_REFRESH_TTL:7}
    # Env-only key that encrypts recovery-mailbox POP3 passwords at rest (AES-GCM). No default: the app
    # must fail fast if it's missing, so we never persist those credentials in plaintext.
    recovery-enc-key: ${RECOVERY_ENC_KEY}
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  rate-limit:
    auth-requests-per-minute: 20
    # Stricter cap for buyer money mutations (POST /api/wallet/deposit, /withdraw).
    sensitive-requests-per-minute: 10
  binance:
    deposit-wallet-address: ${BINANCE_DEPOSIT_WALLET:TXxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
    network: ${BINANCE_NETWORK:TRC20-USDT}
    # --- Auto-credit poller (personal Binance Spot API, READ-only key) ---
    # Reads your Binance Pay transaction history and auto-credits the buyer whose deposit
    # expects the exact amount received. Leave enabled=false (or keys blank) for manual admin flow.
    enabled: ${BINANCE_POLL_ENABLED:}
    # Secrets are env-only. Blank keys keep isConfigured()=false so the poller stays off.
    api-key: ${BINANCE_API_KEY:}
    api-secret: ${BINANCE_API_SECRET:}
    api-base: ${BINANCE_API_BASE:https://api.binance.com}
    coin: ${BINANCE_COIN:USDT}
    # How far back (minutes) each poll scans Binance deposit history.
    lookback-minutes: ${BINANCE_LOOKBACK_MINUTES:1440}
    # Poll cadence in milliseconds (default 2 minutes).
    poll-interval-ms: ${BINANCE_POLL_INTERVAL_MS:120000}
    # Max gap between requested and settled amount to auto-credit (else left for manual review).
    amount-tolerance: ${BINANCE_AMOUNT_TOLERANCE:0.01}
  telegram:
    # Long-polling bot. Registers only when enabled=true AND a token is set (env-only).
    enabled: ${TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    # This app's own REST API, which the bot calls on the user's behalf.
    api-base: ${TELEGRAM_API_BASE:http://localhost:${PORT:${SERVER_PORT:8080}}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    # App logs at INFO in production to stay well under host log-rate limits; override to DEBUG locally
    # via LOG_LEVEL_APP if you need it.
    store.mailstock: ${LOG_LEVEL_APP:INFO}
    # The Telegram long-poll library logs a stack trace on every getUpdates 409 Conflict. If two
    # instances ever poll the same token, that becomes a log flood — cap it so it can't overwhelm the
    # host's log-rate limit. The real fix for a 409 is ensuring only ONE instance polls the token.
    org.telegram.telegrambots.updatesreceivers.DefaultBotSession: ${LOG_LEVEL_TELEGRAM:OFF}
