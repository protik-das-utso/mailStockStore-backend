server:
  # Render (and most PaaS) inject the listen port as PORT. Fall back to SERVER_PORT, then 8080 locally.
  port: ${PORT:${SERVER_PORT:8080}}
  forward-headers-strategy: framework
  servlet:
    context-path: /

spring:
  application:
    name: mailstock-backend

  datasource:
    # Full DB_URL wins; otherwise assembled from parts (Render supplies host/port/name/user/pass
    # separately via fromDatabase, and blueprints can't string-interpolate a single JDBC URL).
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mailstock}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 15

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${SMTP_HOST:smtp.kuku.lu}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          # Port 465 = implicit SSL (InstAddr / kuku.lu). Use ssl.enable, NOT starttls.
          # For port 587 instead, set SMTP_SSL=false, SMTP_STARTTLS=true, SMTP_PORT=587.
          ssl:
            enable: ${SMTP_SSL:true}
            trust: ${SMTP_HOST:smtp.kuku.lu}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

app:
  name: MailStock.store
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  # Writable directory for admin-uploaded media (e.g. the deposit QR). Created on first upload.
  uploads-dir: ${UPLOADS_DIR:./data/uploads}
  mail:
    from: ${MAIL_FROM:no-reply@mailstock.store}
    from-name: ${MAIL_FROM_NAME:MailStock.store}
  security:
    jwt:
      # No default: the app must fail fast if JWT_SECRET is not provided (env-only secret).
      secret: ${JWT_SECRET}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL:30}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  rate-limit:
    auth-requests-per-minute: 20
    # Stricter cap for buyer money mutations (POST /api/wallet/deposit, /withdraw).
    sensitive-requests-per-minute: 10
  binance:
    deposit-wallet-address: ${BINANCE_DEPOSIT_WALLET:TXxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
    network: ${BINANCE_NETWORK:TRC20-USDT}
    # --- Auto-credit poller (personal Binance Spot API, READ-only key) ---
    # Reads your Binance Pay transaction history and auto-credits the buyer whose deposit
    # expects the exact amount received. Leave enabled=false (or keys blank) for manual admin flow.
    enabled: ${BINANCE_POLL_ENABLED:}
    # Secrets are env-only. Blank keys keep isConfigured()=false so the poller stays off.
    api-key: ${BINANCE_API_KEY:}
    api-secret: ${BINANCE_API_SECRET:}
    api-base: ${BINANCE_API_BASE:https://api.binance.com}
    coin: ${BINANCE_COIN:USDT}
    # How far back (minutes) each poll scans Binance deposit history.
    lookback-minutes: ${BINANCE_LOOKBACK_MINUTES:1440}
    # Poll cadence in milliseconds (default 2 minutes).
    poll-interval-ms: ${BINANCE_POLL_INTERVAL_MS:120000}
    # Max gap between requested and settled amount to auto-credit (else left for manual review).
    amount-tolerance: ${BINANCE_AMOUNT_TOLERANCE:0.01}
  telegram:
    # Long-polling bot. Registers only when enabled=true AND a token is set (env-only).
    enabled: ${TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    # This app's own REST API, which the bot calls on the user's behalf.
    api-base: ${TELEGRAM_API_BASE:http://localhost:${PORT:${SERVER_PORT:8080}}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Redis is configured but not used yet; skip its health check so the app
    # doesn't spam connection errors when no Redis is running. Set to true once
    # a real Redis is available and something actually uses it.
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    store.mailstock: DEBUG
